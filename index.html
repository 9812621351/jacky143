<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car World</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            color: yellow;
        }
        .container {
            padding: 20px;
        }
        .car-card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #333;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to Car World</h1>
    <p>Your favorite place for cars 🚗</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Cars</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <div class="car-card">
        <h2>Sports Cars</h2>
        <p>Fast and powerful cars designed for speed and performance.</p>
    </div>

    <div class="car-card">
        <h2>SUVs</h2>
        <p>Perfect for families and off-road adventures.</p>
    </div>

    <div class="car-card">
        <h2>Electric Cars</h2>
        <p>Eco-friendly cars powered by electricity.</p>
    </div>
</div>

<footer>
    <p>© 2026 Car World</p>
</footer>

</body>
</html>
